name: sadc-oms

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_strong_Pass123"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    healthcheck:
      # /opt/mssql-tools18 ships with SQL Server 2022; -C trusts the dev certificate.
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -No -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"   # management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  api:
    build:
      context: .
      dockerfile: src/SadcOms.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"   # auto-migrates + seeds + exposes Swagger for the demo
      ConnectionStrings__SqlServer: "Server=sqlserver,1433;Database=SadcOms;User Id=sa;Password=Your_strong_Pass123;TrustServerCertificate=True;Encrypt=False"
      RabbitMq__HostName: "rabbitmq"
      Jwt__DevSigningKey: "dev-only-symmetric-signing-key-change-me-please-32+chars"
    ports:
      - "5080:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: src/SadcOms.Worker/Dockerfile
    environment:
      DOTNET_ENVIRONMENT: "Production"
      RabbitMq__HostName: "rabbitmq"
    depends_on:
      rabbitmq:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: src/web/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api
